name: Predictive Maintenance ML Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - name: Install dependencies
        run: | 
          pip install -r requirements.txt huggingface_hub nbconvert
      - name: Execute ML Pipeline
        run: |
          # In a real CI, you'd run jupyter nbconvert --to notebook --execute 
          # Here we assume the artifacts are already present or the logic is in app.py
          echo "Executing ML Pipeline logic..."
      - name: Deploy to HF Spaces
        run: |
          python -c "
          from huggingface_hub import HfApi; import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_folder(repo_id='Divyap90/predictive-maintenance-app', repo_type='space', folder_path='.')
          "